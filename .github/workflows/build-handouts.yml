name: Build & upload handouts

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      slugs:
        description: "Slugs separes par virgules (vide = tous)"
        required: false
        default: ""

permissions:
  contents: read

env:
  R2_BUCKET: lm-handouts
  PREVIEW_URL: http://localhost:4321

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # On a besoin de l'historique pour faire git diff HEAD~1
          fetch-depth: 2

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Detect changed handouts
        id: detect
        # L'input de dispatch est passe via env (jamais interpole directement dans
        # le script) pour eviter une injection shell. Cf. SLUGS_INPUT ci-dessous.
        env:
          SLUGS_INPUT: ${{ github.event.inputs.slugs }}
        run: |
          set -euo pipefail

          # Manual dispatch : utiliser l'input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Sanitize : un slug est en kebab-case, separes par virgules. On ne
            # garde que [a-z0-9,_-] pour neutraliser toute tentative d'injection.
            INPUT=$(printf '%s' "$SLUGS_INPUT" | tr -cd 'a-z0-9,_-')
            if [ -z "$INPUT" ]; then
              echo "args=--all" >> "$GITHUB_OUTPUT"
            else
              echo "args=--slugs $INPUT" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # Push : detecter via git diff
          BEFORE="${{ github.event.before }}"
          # Premier commit ou force-push : pas d'historique fiable, build tout
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "args=--all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # fetch-depth: 2 ne couvre pas les pushs multi-commits : github.event.before
          # peut pointer plus loin que HEAD~1. On tente un fetch cible avant de bailler.
          # Si le commit reste introuvable, fallback --all (sur de detecter une regression
          # globale plutot que de manquer un changement).
          if ! git cat-file -e "$BEFORE" 2>/dev/null; then
            echo "Commit $BEFORE absent du clone, fetch cible..."
            git fetch origin "$BEFORE" --depth=1 2>/dev/null || true
          fi
          if ! git cat-file -e "$BEFORE" 2>/dev/null; then
            echo "Commit $BEFORE toujours inaccessible -> rebuild all"
            echo "args=--all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" || true)
          echo "Fichiers modifies :"
          echo "$CHANGED"

          # Globals = fichier dont la modif force un rebuild de TOUS les handouts.
          # On reste large : layouts, composants slides, modules, styles communs, package.json, le script lui-meme.
          GLOBAL_RE='^(src/layouts/|src/components/slides/|src/components/modules/|src/components/SlideTitle\.astro|src/styles/handout\.css|src/styles/slides\.css|src/styles/global\.css|package\.json|package-lock\.json|astro\.config|scripts/build-handouts\.mjs)'
          if echo "$CHANGED" | grep -E "$GLOBAL_RE" > /dev/null; then
            echo "Changement global detecte -> rebuild all"
            echo "args=--all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Sinon, lister les slugs des .mdx modifies.
          # `|| true` car grep retourne 1 si pas de match, ce qui ferait crash set -e.
          SLUGS=$(echo "$CHANGED" | { grep -E '^src/content/presentations/.+\.mdx$' || true; } | sed 's|^src/content/presentations/||; s|\.mdx$||' | paste -sd, -)
          if [ -z "$SLUGS" ]; then
            echo "Aucun handout a rebuilder."
            echo "args=" >> "$GITHUB_OUTPUT"
          else
            echo "Slugs detectes : $SLUGS"
            echo "args=--slugs $SLUGS" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Chrome
        if: steps.detect.outputs.args != ''
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome

      - name: Build Astro
        if: steps.detect.outputs.args != ''
        run: npm run build

      - name: Start preview server
        if: steps.detect.outputs.args != ''
        run: |
          npm run preview > preview.log 2>&1 &
          echo "Preview PID: $!"

      - name: Generate PDFs
        if: steps.detect.outputs.args != ''
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          PREVIEW_URL: ${{ env.PREVIEW_URL }}
        run: npm run build:handouts -- ${{ steps.detect.outputs.args }}

      - name: List generated PDFs
        if: steps.detect.outputs.args != ''
        run: ls -lh dist/handouts/

      - name: Upload to R2
        if: steps.detect.outputs.args != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # wrangler-action ne supporte pas les boucles shell : on appelle wrangler
        # directement via npx (wrangler est deja installe via puppeteer-core deps
        # ... non, on l'installe explicitement ici, plus simple). Cache 1h CDN +
        # 5min navigateur : utilisateur recoit la version recente vite tout en
        # deduisant la charge sur R2.
        run: |
          npm install --no-save wrangler@4
          for f in dist/handouts/*.pdf; do
            key=$(basename "$f")
            echo "Upload $key"
            npx wrangler r2 object put "${{ env.R2_BUCKET }}/$key" \
              --file "$f" \
              --content-type "application/pdf" \
              --cache-control "public, max-age=300, s-maxage=3600" \
              --remote
          done
