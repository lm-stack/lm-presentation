<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 56" role="img" aria-label="Genderize.io">
  <!-- Wordmark maison : Genderize.io n'a pas de logo de marque exploitable (favicon =
       simple cercle orange). Texte en police systeme (Arial / Liberation Sans) car un
       SVG charge en <img> n'herite pas des webfonts du deck. ".io" en orange = rappel
       de l'identite. -->
  <text x="165" y="41" text-anchor="middle"
        font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="44" font-weight="800" letter-spacing="-1.5" fill="#1f2937">
    <tspan>genderize</tspan><tspan fill="#F5821F">.io</tspan>
  </text>
</svg>
