<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FDF1F3"/><stop offset="1" stop-color="#FBFCFE"/></linearGradient>
<radialGradient id="gl" cx="50%" cy="50%" r="52%"><stop offset="0" stop-color="#E73952" stop-opacity="0.20"/><stop offset="1" stop-color="#E73952" stop-opacity="0"/></radialGradient>
<pattern id="dt" width="17" height="17" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.3" fill="#1E2B3E" fill-opacity="0.08"/></pattern>
</defs>
<rect x="6" y="6" width="188" height="188" rx="20" fill="url(#bg)"/>
<rect x="6" y="6" width="188" height="188" rx="20" fill="url(#dt)"/>
<circle class="gl" cx="100" cy="100" r="78" fill="url(#gl)"/>
<g class="sym" stroke="#E73952" fill="none" stroke-linecap="round">
<circle cx="100" cy="100" r="40" stroke-width="5.5"/>
<circle class="ring" cx="100" cy="100" r="40" stroke-width="3" stroke-opacity="0.55"/>
</g>
<style>
.gl{animation:b 3.4s ease-in-out infinite}
.sym{transform-box:view-box;transform-origin:100px 100px;animation:p 3.4s ease-in-out infinite}
.ring{stroke-dasharray:251;stroke-dashoffset:251;animation:draw 3.4s ease-in-out infinite}
@keyframes b{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes p{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes draw{0%{stroke-dashoffset:251}55%,100%{stroke-dashoffset:0}}
@media (prefers-reduced-motion:reduce){.gl,.sym,.ring{animation:none}}
</style>
</svg>